    # Vehicle Schemas
    VehicleDetailed:
      type: object
      properties:
        id:
          type: integer
        model:
          type: string
        licensePlate:
          type: string
        regionCode:
          type: string
        payloadCapacity:
          type: integer
        driverFullName:
          type: string
          nullable: true
      required:
        - id
        - model
        - licensePlate
        - regionCode
        - payloadCapacity

    VehicleDetailedTablePaginatedResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VehicleDetailed'
        totalCount:
          type: integer
          format: int64
      required:
        - items
        - totalCount

    # Other
    RejectDocumentDto:
