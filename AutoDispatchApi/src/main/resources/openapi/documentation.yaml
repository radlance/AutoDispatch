          type: integer
          format: int64
        totalDrivers:
          type: integer
          format: int64
      required:
        - totalRequests
        - completedRequests
        - totalVehicles
        - totalDrivers

    DashboardStatistics:
      type: object
      properties:
        general:
          $ref: '#/components/schemas/GeneralStats'
        requestsByStatus:
          type: array
          items:
            $ref: '#/components/schemas/StatItem'
        requestsByCargoType:
          type: array
          items:
            $ref: '#/components/schemas/StatItem'
        driversByStatus:
          type: array
          items:
            $ref: '#/components/schemas/StatItem'
        vehiclesByStatus:
          type: array
          items:
            $ref: '#/components/schemas/StatItem'
        topDrivers:
          type: array
          items:
