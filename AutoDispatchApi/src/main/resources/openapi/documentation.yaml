        - requestsByStatus
        - requestsByCargoType
        - driversByStatus
        - vehiclesByStatus
        - topDrivers
        - popularRoutes

    ReportType:
      type: string
      enum: [ALL, REQUESTS, DRIVERS, VEHICLES]

