openapi: "3.0.3"
info:
  title: "AutoDispatch API"
  description: "API for AutoDispatch logistics management system"
  version: "1.0.0"
servers:
  - url: "http://localhost:8084/api"
    description: "Local development server"

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUser'
      responses:
        '200':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login and get tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUser'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'

  /auth/refresh-token:
    post:
      tags:
        - Auth
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Session expired or invalid

  /admin/users:
    get:
      tags:
        - Admin
      summary: Get paginated list of users
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: statusIds
          in: query
          description: Comma-separated list of status IDs
          schema:
            type: string
        - name: roleIds
          in: query
          description: Comma-separated list of role IDs
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailedTablePaginatedResult'

  /admin/filters:
    get:
      tags:
        - Admin
      summary: Get user management filters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Filters for user management
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserManagementFilters'

  /admin/users/{id}/block:
    patch:
      tags:
        - Admin
      summary: Block a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User blocked successfully
        '400':
          description: Invalid user ID

  /admin/users/{id}/unblock:
    patch:
      tags:
        - Admin
      summary: Unblock a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User unblocked successfully
        '400':
          description: Invalid user ID

  /admin/users/{id}/delete:
    patch:
      tags:
        - Admin
      summary: Delete a user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User deleted successfully
        '400':
          description: Invalid user ID

  /deliveries:
    get:
      tags:
        - Deliveries
      summary: Get driver's deliveries
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 5
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of deliveries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryListPaginatedResult'

  /deliveries/{id}/details:
    get:
      tags:
        - Deliveries
      summary: Get delivery details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Delivery details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryDetailed'

  /deliveries/{id}/detour-sheet:
    get:
      tags:
        - Deliveries
      summary: Get delivery detour sheet (PDF)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /deliveries/{id}/start:
    post:
      tags:
        - Deliveries
      summary: Start delivery
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Delivery started

  /deliveries/{id}/arrive-loading:
    post:
      tags:
        - Deliveries
      summary: Mark arrival at loading point
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Status updated

  /deliveries/{id}/depart-loading:
    post:
      tags:
        - Deliveries
      summary: Mark departure from loading point
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Status updated

  /deliveries/{id}/arrive-unloading:
    post:
      tags:
        - Deliveries
      summary: Mark arrival at unloading point
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Status updated

  /deliveries/{id}/upload-documents:
    post:
      tags:
        - Deliveries
      summary: Upload acceptance documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Documents uploaded

  /deliveries/{id}/upload-shipping-documents:
    post:
      tags:
        - Deliveries
      summary: Upload shipping documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Documents uploaded

  /deliveries/{id}/retake-documents:
    post:
      tags:
        - Deliveries
      summary: Retake documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: typeId
          in: query
          schema:
            type: integer
            default: 2
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '200':
          description: Documents updated

  /deliveries/history/my:
    get:
      tags:
        - Deliveries
      summary: Get current driver's delivery history
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 5
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of history items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverHistoryListPaginatedResult'

  /deliveries/history/{driverId}:
    get:
      tags:
        - Deliveries
      summary: Get specific driver's delivery history
      security:
        - bearerAuth: []
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 5
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of history items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverHistoryListPaginatedResult'

  /documents/{id}/approve:
    post:
      tags:
        - Documents
      summary: Approve acceptance documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Documents approved

  /documents/{id}/approve-shipping:
    post:
      tags:
        - Documents
      summary: Approve shipping documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Documents approved

  /documents/{id}/reject:
    post:
      tags:
        - Documents
      summary: Reject documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectDocumentDto'
      responses:
        '200':
          description: Documents rejected

  /drivers:
    get:
      tags:
        - Drivers
      summary: Get paginated list of drivers
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of drivers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverTablePaginatedResult'

  /drivers/assignments:
    get:
      tags:
        - Drivers
      summary: Get drivers with assignment stats
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of driver stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverStatsTablePaginatedResult'

  /drivers/without-vehicle:
    get:
      tags:
        - Drivers
      summary: Get drivers without assigned vehicle
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of drivers without vehicle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverWithoutCarTablePaginatedResult'

  /drivers/{id}/schedule:
    get:
      tags:
        - Drivers
      summary: Get driver's work schedule
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Work schedule
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DriverWorkShift'
    put:
      tags:
        - Drivers
      summary: Update driver's work schedule
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverWorkScheduleRequest'
      responses:
        '200':
          description: Schedule updated

  /profile:
    get:
      tags:
        - Profile
      summary: Get current user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /profile/details:
    get:
      tags:
        - Profile
      summary: Get current user's detailed profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Detailed profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDetails'

  /profile/avatar:
    post:
      tags:
        - Profile
      summary: Upload profile avatar
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
    delete:
      tags:
        - Profile
      summary: Delete profile avatar
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Avatar deleted

  /requests:
    get:
      tags:
        - Requests
      summary: Get paginated list of requests with filters
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: originCityIds
          in: query
          description: Comma-separated list of city IDs
          schema:
            type: string
        - name: destinationCityIds
          in: query
          description: Comma-separated list of city IDs
          schema:
            type: string
        - name: cargoTypeIds
          in: query
          description: Comma-separated list of cargo type IDs
          schema:
            type: string
        - name: statusIds
          in: query
          description: Comma-separated list of status IDs
          schema:
            type: string
        - name: driverIds
          in: query
          description: Comma-separated list of driver IDs
          schema:
            type: string
        - name: vehicleIds
          in: query
          description: Comma-separated list of vehicle IDs
          schema:
            type: string
      responses:
        '200':
          description: List of requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestTablePaginatedResult'
    post:
      tags:
        - Requests
      summary: Create a new request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        '201':
          description: Request created

  /requests/filters:
    get:
      tags:
        - Requests
      summary: Get request filters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Filters for requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestFilters'

  /requests/customers:
    get:
      tags:
        - Requests
      summary: Search customers
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'

  /requests/{id}:
    put:
      tags:
        - Requests
      summary: Edit a request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        '200':
          description: Request updated
    delete:
      tags:
        - Requests
      summary: Remove a request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Request removed

  /requests/{id}/cancel:
    put:
      tags:
        - Requests
      summary: Cancel request assignment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Assignment cancelled

  /requests/{id}/assign:
    post:
      tags:
        - Requests
      summary: Assign driver to request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRequest'
      responses:
        '201':
          description: Driver assigned
    put:
      tags:
        - Requests
      summary: Reassign driver to request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRequest'
      responses:
        '200':
          description: Driver reassigned
    delete:
      tags:
        - Requests
      summary: Unassign driver from request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Driver unassigned

  /requests/available:
    get:
      tags:
        - Requests
      summary: Get available requests for driver
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 3
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of available requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestListPaginatedResult'

  /statistics:
    get:
      tags:
        - Statistics
      summary: Get dashboard statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatistics'

  /statistics/report:
    post:
      tags:
        - Statistics
      summary: Generate a report
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '200':
          description: Report generated successfully
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary

  /vehicles:
    get:
      tags:
        - Vehicles
      summary: Get paginated list of vehicles
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of vehicles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDetailedTablePaginatedResult'

  /vehicles/unassigned:
    get:
      tags:
        - Vehicles
      summary: Get unassigned vehicles
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of unassigned vehicles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDetailedTablePaginatedResult'

  /vehicles/{id}/assignment:
    post:
      tags:
        - Vehicles
      summary: Assign driver to vehicle
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRequest'
      responses:
        '200':
          description: Driver assigned
    patch:
      tags:
        - Vehicles
      summary: Reassign driver to vehicle
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRequest'
      responses:
        '200':
          description: Driver reassigned

  /vehicles/assignment/{driverId}:
    delete:
      tags:
        - Vehicles
      summary: Unassign driver from vehicle
      security:
        - bearerAuth: []
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Driver unassigned

  /open-delivery/{id}:
    get:
      tags:
        - Deliveries
      summary: Deep link to open delivery in app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: number
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to app deep link
        '400':
          description: Missing ID

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Common Schemas
    Status:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name

    # Auth Schemas
    LoginUser:
      type: object
      properties:
        login:
          type: string
        password:
          type: string
          format: password
      required:
        - login
        - password

    RegisterUser:
      type: object
      properties:
        login:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        fullName:
          type: string
        phoneNumber:
          type: string
        roleId:
          type: integer
      required:
        - login
        - email
        - password
        - fullName
        - phoneNumber
        - roleId

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required:
        - accessToken
        - refreshToken

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    User:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        fullName:
          type: string
        phoneNumber:
          type: string
        isDispatcher:
          type: boolean
        createdAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - login
        - fullName
        - phoneNumber
        - isDispatcher

    # Admin Schemas
    UserRole:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name

    UserShort:
      type: object
      properties:
        id:
          type: integer
        login:
          type: string
        fullName:
          type: string
        phoneNumber:
          type: string
        avatarUrl:
          type: string
          nullable: true
      required:
        - id
        - login
        - fullName
        - phoneNumber

    UserDetailed:
      allOf:
        - $ref: '#/components/schemas/UserShort'
        - type: object
          properties:
            email:
              type: string
              format: email
            status:
              $ref: '#/components/schemas/Status'
            role:
              $ref: '#/components/schemas/UserRole'
            createdBy:
              $ref: '#/components/schemas/UserShort'
              nullable: true
            updatedBy:
              $ref: '#/components/schemas/UserShort'
              nullable: true
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
              nullable: true
            lastLoginAt:
              type: string
              format: date-time
              nullable: true
          required:
            - email
            - status
            - role
            - createdAt

    UserManagementFilters:
      type: object
      properties:
        statuses:
          type: array
          items:
            $ref: '#/components/schemas/Status'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
      required:
        - statuses
        - roles

    # Pagination Schemas
    UserDetailedTablePaginatedResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserDetailed'
        totalCount:
          type: integer
          format: int64
      required:
        - items
        - totalCount

    # Delivery Schemas
    Point:
      type: object
      properties:
        address:
          type: string
          nullable: true
        lat:
          type: number
