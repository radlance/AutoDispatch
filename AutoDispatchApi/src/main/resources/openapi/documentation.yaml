        lon:
          type: number
          format: double
      required:
        - lat
        - lon

    Delivery:
      type: object
      properties:
        id:
          type: integer
        status:
          $ref: '#/components/schemas/Status'
        loadingPoint:
          $ref: '#/components/schemas/Point'
        unloadingPoint:
          $ref: '#/components/schemas/Point'
        cargoWeight:
          type: number
          format: double
          nullable: true
        cargoTypeName:
          type: string
          nullable: true
        plannedUnloadingAt:
          type: string
          format: date-time
          nullable: true
        actualUnloadingAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        requestNumber:
          type: string
          nullable: true
      required:
        - id
        - loadingPoint
        - unloadingPoint

    DeliveryListPaginatedResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Delivery'
        hasMore:
          type: boolean
      required:
        - items
        - hasMore

    DeliveryDocument:
      type: object
      properties:
        id:
          type: integer
        imageUrl:
          type: string
        uploadedAt:
          type: string
          format: date-time
          nullable: true
        typeId:
          type: integer
      required:
        - id
        - imageUrl
        - typeId

    DeliveryDetailed:
      allOf:
        - $ref: '#/components/schemas/Delivery'
        - type: object
          properties:
            origin:
              type: string
              nullable: true
            destination:
              type: string
              nullable: true
            transportationDescription:
              type: string
              nullable: true
            plannedLoadingAt:
              type: string
              format: date-time
              nullable: true
            arrivedLoadingAt:
              type: string
              format: date-time
              nullable: true
            actualLoadingAt:
              type: string
              format: date-time
              nullable: true
            arrivedUnloadingAt:
              type: string
              format: date-time
              nullable: true
            cargo:
              $ref: '#/components/schemas/Cargo'
            dispatcherFullName:
              type: string
            dispatcherPhoneNumber:
              type: string
            customer:
              $ref: '#/components/schemas/Customer'
            vehicle:
              $ref: '#/components/schemas/Vehicle'
            rejectionReason:
              type: string
              nullable: true
            documents:
              type: array
              items:
                $ref: '#/components/schemas/DeliveryDocument'
          required:
            - cargo
            - dispatcherFullName
            - dispatcherPhoneNumber
            - customer

    # Request Schemas
    CargoType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name

    Cargo:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CargoType'
        weight:
          type: number
          format: double
        volume:
          type: number
          format: double
          nullable: true
        description:
          type: string
          nullable: true
      required:
        - type
        - weight

    Customer:
      type: object
      properties:
        id:
          type: integer
        organizationName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
      required:
        - id
        - organizationName
        - email
        - phoneNumber

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        model:
          type: string
        licensePlate:
          type: string
        regionCode:
          type: string
        payloadCapacity:
          type: integer
      required:
        - id
        - model
        - licensePlate
        - regionCode
        - payloadCapacity

    AssignRequest:
      type: object
      properties:
        driverId:
          type: integer
      required:
        - driverId

    CreateRequest:
      type: object
      properties:
        loadingAddress:
          type: string
          nullable: true
        loadingLat:
          type: number
          format: double
        loadingLon:
          type: number
          format: double
        unloadingAddress:
          type: string
          nullable: true
        unloadingLat:
          type: number
          format: double
        unloadingLon:
          type: number
          format: double
        cargoTypeId:
          type: integer
        cargoWeight:
          type: number
          format: double
        cargoVolume:
          type: number
          format: double
          nullable: true
        cargoDescription:
          type: string
          nullable: true
        customerName:
          type: string
        customerEmail:
          type: string
          format: email
        customerPhone:
          type: string
        originId:
          type: integer
          nullable: true
        destinationId:
          type: integer
          nullable: true
        transportationDescription:
          type: string
          nullable: true
        plannedLoadingAt:
          type: string
          format: date-time
        plannedUnloadingAt:
          type: string
          format: date-time
      required:
        - loadingLat
        - loadingLon
        - unloadingLat
        - unloadingLon
        - cargoTypeId
        - cargoWeight
        - customerName
        - customerEmail
        - customerPhone
        - plannedLoadingAt
        - plannedUnloadingAt

    Request:
      allOf:
        - $ref: '#/components/schemas/DeliveryDetailed'
        - type: object
          properties:
            driverId:
              type: integer
              nullable: true
            driverFullName:
              type: string
              nullable: true

    RequestTablePaginatedResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Request'
        totalCount:
          type: integer
          format: int64
      required:
        - items
        - totalCount

    RequestListPaginatedResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Request'
        hasMore:
          type: boolean
      required:
        - items
        - hasMore

    City:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name

    UserFilter:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
      required:
        - id
        - fullName

    RequestFilters:
      type: object
      properties:
        cities:
          type: array
          items:
            $ref: '#/components/schemas/City'
        cargoTypes:
          type: array
          items:
            $ref: '#/components/schemas/CargoType'
        statuses:
          type: array
          items:
            $ref: '#/components/schemas/Status'
        drivers:
          type: array
          items:
            $ref: '#/components/schemas/UserFilter'
        vehicles:
          type: array
          items:
            $ref: '#/components/schemas/Vehicle'
      required:
        - cities
        - cargoTypes
        - statuses
        - drivers
        - vehicles

    # Driver Schemas
    DeliveriesStats:
      type: object
      properties:
