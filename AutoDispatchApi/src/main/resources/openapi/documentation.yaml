        vehicle:
          $ref: '#/components/schemas/Vehicle'
        deliveriesStats:
          $ref: '#/components/schemas/DeliveriesStats'
        workSchedule:
          type: array
          items:
            $ref: '#/components/schemas/DriverWorkShift'
      required:
