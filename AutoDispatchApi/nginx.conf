events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;

        client_max_body_size 20M;

        location /static/ {
            alias /uploads/;
        }

        location /stub_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }

        location / {
            proxy_pass http://api:8084;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
