services:
  api:
    container_name: auto_dispatch_api
    build: .
    expose:
      - "8084"
    ports:
      - "8084:8084"
    volumes:
      - uploaded_files:/uploads
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/auto_dispatch_api
      RABBIT_URI: amqp://guest:guest@rabbitmq:5672
      MODE: release
      OTEL_RESOURCE_ATTRIBUTES: "service.name=AutoDispatchApi,service.instance.id=AutoDispatchApi"
      OTEL_SERVICE_NAME: AutoDispatchApi
      OTEL_METRICS_EXPORTER: none
      OTEL_TRACES_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    labels:
      logging: "true"

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:1@db:5432/auto_dispatch_api?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus
    restart: always
    ports:
      - "3570:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    links:
      - api
      - postgres_exporter
      - rabbitmq

  # ---- Logging Stack ----

  loki:
    image: grafana/loki:3.5.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  alloy:
    image: grafana/alloy:v1.9.1
    container_name: alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    user: "104"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana:/etc/grafana/provisioning
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    links:
      - api
      - prometheus
      - loki

  nginx:
    container_name: auto_dispatch_nginx
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploaded_files:/uploads:ro
    depends_on:
      - api

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - '--nginx.scrape-uri=http://nginx/stub_status'
    depends_on:
      - nginx

  db:
    container_name: postgres_db
    image: postgres:18
    volumes:
      - tmp_db:/var/lib/postgresql
    environment:
      POSTGRES_DB: auto_dispatch_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1s
      timeout: 5s
      retries: 5

  rabbitmq:
    container_name: rabbitmq_broker
    image: rabbitmq:3-management-alpine
    volumes:
      - rabbit_data:/var/lib/rabbitmq
      - ./observability/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "check_running" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uploaded_files:
  tmp_db:
  rabbit_data:
  loki_data:
  lgtm_data:

